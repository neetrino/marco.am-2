name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Pin pnpm 9.x so CI does not run pnpm 11 bootstrap (can mis-read v9
      # lockfiles as ERR_PNPM_BROKEN_LOCKFILE). Must run before setup-node cache.
      - uses: pnpm/action-setup@v5
        with:
          version: 9.14.2
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm run db:generate

      - name: Lint
        run: pnpm run lint

      - name: TypeScript
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm run build
